name: 第三方规则全自动编译 (Auto 分支)

on:
  schedule:
    # UTC时间19:45，即北京时间凌晨03:45。完美对接04:00的OpenClash更新
    - cron: '45 19 * * *' 
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write # 允许推送到 auto 分支
      actions: write  # 允许 v7 插件删除多余的运行日志

    steps:
      - name: 下载并准备 Mihomo 内核
        run: |
          curl -L -o mihomo.gz https://github.com/MetaCubeX/mihomo/releases/download/v1.19.24/mihomo-linux-amd64-v1.19.24.gz
          gunzip mihomo.gz
          chmod +x mihomo

      - name: 抓取第三方 ChinaIPs 规则
        run: |
          curl -L -o input.yaml "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/ChinaIPs/ChinaIPs_IP.yaml"

      - name: 执行 MRS 转换编译
        run: |
          ./mihomo convert-ruleset ipcidr yaml input.yaml ChinaIPs.mrs

      - name: 纯净打包并强推至 auto 分支 (绝对隔离魔法)
        run: |
          # 1. 新建一个极其干净的发布目录，把编译好的文件丢进去
          mkdir publish
          mv ChinaIPs.mrs publish/
          cd publish
          
          # 2. 在这个空目录里初始化一个全新的 Git 仓库
          git init
          
          # 3. 创建一个没有历史包袱的“孤儿分支”叫 auto
          git checkout --orphan auto
          
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          
          # 4. 提交我们唯一的产物
          git add ChinaIPs.mrs
          git commit -m "🤖 第三方规则编译更新: $(date +'%Y-%m-%d %H:%M:%S')"
          
          # 5. 带着 Token 强制推送，覆盖线上的 auto 分支
          git push -f https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git auto
          
      - name: 清理 Actions 历史日志 (v7 稳定版)
        uses: igorjs/gh-actions-clean-workflow@v7
        with:
          # 精准打击：只清理这个特定的工作流日志
          workflow_names: "第三方规则全自动编译 (Auto 分支)"
          # 极端克制：无视天数，按次数清理
          runs_older_than: 0
          # 强迫症福音：只保留最近 3 次的运行记录
          runs_to_keep: 3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
